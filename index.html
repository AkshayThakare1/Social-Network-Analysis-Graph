<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Network Analysis — UTA Social Work</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; overflow: hidden; }

  #app { display: flex; flex-direction: column; height: 100vh; }

  /* Top bar */
  #topbar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    background: #fff;
    border-bottom: 1px solid #e2e6ea;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    z-index: 10;
    flex-shrink: 0;
  }
  #topbar h1 { font-size: 15px; font-weight: 700; color: #1a2e44; margin-right: 10px; }
  .btn {
    padding: 6px 14px; border-radius: 6px; border: 1.5px solid #c9d3de;
    background: #fff; cursor: pointer; font-size: 13px; font-weight: 500; color: #2d4059;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn:hover { background: #eaf1fb; border-color: #3a7bd5; }
  .btn.active { background: #3a7bd5; color: #fff; border-color: #3a7bd5; }

  .legend { display: flex; align-items: center; gap: 14px; margin-left: auto; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #555; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .legend-sq { width: 12px; height: 12px; display: inline-block; border-radius: 2px; }

  /* Main area */
  #main { display: flex; flex: 1; overflow: hidden; position: relative; }

  #graph-container { flex: 1; position: relative; overflow: hidden; }
  svg { width: 100%; height: 100%; display: block; }

  /* Info panel */
  #info-panel {
    position: absolute;
    bottom: 20px; right: 20px;
    width: 300px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.14);
    padding: 20px;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 100;
    max-height: 70vh;
    overflow-y: auto;
  }
  #info-panel.hidden { opacity: 0; pointer-events: none; transform: translateY(8px); }

  #panel-title { font-size: 18px; font-weight: 700; color: #1a2e44; margin-bottom: 4px; word-break: break-word; }
  #panel-type { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 14px; }
  #panel-type.person { color: #e67e22; }
  #panel-type.interest { color: #3a7bd5; }

  .info-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; font-size: 13px; }
  .info-label { font-weight: 600; color: #888; min-width: 72px; flex-shrink: 0; }
  .info-value { color: #2d4059; word-break: break-word; }
  .info-value a { color: #3a7bd5; text-decoration: none; }
  .info-value a:hover { text-decoration: underline; }

  .conn-count { font-size: 22px; font-weight: 700; color: #1a2e44; }
  .conn-label { font-size: 12px; color: #888; margin-bottom: 12px; }

  #conn-list { margin-top: 10px; }
  #conn-list-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin-bottom: 8px; }
  .conn-chip {
    display: inline-block; margin: 2px 3px 2px 0;
    padding: 3px 8px; border-radius: 12px; font-size: 12px;
    cursor: pointer; border: none; font-family: inherit;
    transition: opacity 0.15s;
  }
  .conn-chip:hover { opacity: 0.8; }
  .conn-chip.person { background: #fff3e0; color: #b05e00; }
  .conn-chip.interest { background: #e8f0fe; color: #1a56c4; }

  #close-panel {
    position: absolute; top: 12px; right: 14px;
    background: none; border: none; cursor: pointer;
    font-size: 18px; color: #aaa; line-height: 1;
  }
  #close-panel:hover { color: #555; }

  /* tooltip */
  #tooltip {
    position: absolute; pointer-events: none;
    background: rgba(26,46,68,0.88); color: #fff;
    padding: 5px 10px; border-radius: 6px; font-size: 12px;
    white-space: nowrap; z-index: 200;
    display: none;
  }

  /* node styles */
  .node { cursor: pointer; }
  .node.person rect { fill: #f0a500; stroke: #fff; stroke-width: 1.5px; }
  .node.interest rect { fill: #4a7fc1; stroke: #fff; stroke-width: 1.5px; }
  .node.highlighted.person rect { stroke: #c0392b; stroke-width: 3px; }
  .node.highlighted.interest rect { stroke: #c0392b; stroke-width: 3px; }
  .node.dimmed { opacity: 0.2; }
  .node text { pointer-events: none; font-size: 10px; fill: #1a2e44; font-family: 'Segoe UI', Arial, sans-serif; }

  .link { stroke: #b0bec5; stroke-opacity: 0.55; }
  .link.highlighted { stroke: #e74c3c; stroke-opacity: 0.9; stroke-width: 2px; }
  .link.dimmed { stroke-opacity: 0.05; }

  /* search */
  #search-wrap { position: relative; }
  #search {
    padding: 6px 12px; border-radius: 6px; border: 1.5px solid #c9d3de;
    font-size: 13px; width: 200px; outline: none;
  }
  #search:focus { border-color: #3a7bd5; }
  #search-results {
    position: absolute; top: 100%; left: 0; width: 100%;
    background: #fff; border: 1.5px solid #c9d3de; border-top: none;
    border-radius: 0 0 6px 6px; z-index: 999; max-height: 200px; overflow-y: auto;
    display: none;
  }
  .search-item {
    padding: 6px 12px; cursor: pointer; font-size: 13px; color: #2d4059;
  }
  .search-item:hover { background: #eaf1fb; }
  .search-item .badge {
    font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 8px; margin-left: 6px;
  }
  .badge.person { background: #fff3e0; color: #b05e00; }
  .badge.interest { background: #e8f0fe; color: #1a56c4; }
</style>
</head>

    </div>

  <div id="main">

      <div id="tooltip"></div>

    <div id="info-panel" class="hidden">

      <div class="conn-count" id="conn-count"></div>

      <div id="conn-list">

</div>

// Build adjacency for fast lookup
const adjMap = {};
graphData.nodes.forEach(n => adjMap[n.id] = new Set());
graphData.edges.forEach(e => {
  adjMap[e.source].add(e.target);
  adjMap[e.target].add(e.source);
});

function formatLabel(id) {
  return id.replace(/_/g, ' ').replace(/,_/g, ', ');
}

const svg = d3.select('#svg');
const container = document.getElementById('graph-container');

let width = container.clientWidth;
let height = container.clientHeight;

const g = svg.append('g');

// Zoom
const zoom = d3.zoom()
  .scaleExtent([0.15, 4])
  .on('zoom', (event) => g.attr('transform', event.transform));
svg.call(zoom);

// Node size based on degree
function nodeSize(d) {
  const base = d.type === 'person' ? 12 : 9;
  return base + Math.sqrt(d.degree) * 2.2;
}

// Force simulation
const sim = d3.forceSimulation(graphData.nodes)
  .force('link', d3.forceLink(graphData.edges).id(d => d.id).distance(d => {
    return 160 + (d.source.degree + d.target.degree) * 2.5;
  }).strength(0.25))
  .force('charge', d3.forceManyBody().strength(-900).distanceMax(800))
  .force('center', d3.forceCenter(width / 2, height / 2))
  .force('collision', d3.forceCollide().radius(d => nodeSize(d) + 32).strength(1));

// Links
const linkSel = g.append('g').attr('class', 'links')
  .selectAll('line')
  .data(graphData.edges)
  .enter().append('line')
  .attr('class', 'link')
  .attr('stroke-width', 1);

// Nodes
const nodeSel = g.append('g').attr('class', 'nodes')
  .selectAll('g')
  .data(graphData.nodes)
  .enter().append('g')
  .attr('class', d => `node ${d.type}`)
  .call(d3.drag()
    .on('start', dragStart)
    .on('drag', dragged)
    .on('end', dragEnd))
  .on('click', onNodeClick)
  .on('mouseover', onNodeOver)
  .on('mouseout', onNodeOut);

nodeSel.append('rect')
  .attr('rx', d => d.type === 'person' ? 50 : 4)
  .attr('ry', d => d.type === 'person' ? 50 : 4)
  .each(function(d) {
    const s = nodeSize(d);
    d3.select(this)
      .attr('width', s * 2)
      .attr('height', s * 2)
      .attr('x', -s)
      .attr('y', -s);
  });

nodeSel.append('text')
  .text(d => formatLabel(d.id))
  .attr('text-anchor', 'middle')
  .attr('dy', d => nodeSize(d) + 11)
  .attr('font-size', d => Math.max(9, Math.min(12, 8 + d.degree * 0.15)) + 'px');

sim.on('tick', () => {
  linkSel
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);
  nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
});

// Drag
function dragStart(event, d) {
  if (!event.active) sim.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
function dragEnd(event, d) {
  if (!event.active) sim.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// Tooltip
const tooltip = document.getElementById('tooltip');
function onNodeOver(event, d) {
  tooltip.style.display = 'block';
  tooltip.style.left = (event.pageX + 12) + 'px';
  tooltip.style.top = (event.pageY - 28) + 'px';
  tooltip.textContent = `${formatLabel(d.id)} · ${d.degree} connection${d.degree !== 1 ? 's' : ''}`;
}
function onNodeOut() { tooltip.style.display = 'none'; }

// Highlight
let selectedNode = null;

function highlightNode(d) {
  selectedNode = d;
  const neighbors = adjMap[d.id];

  linkSel.classed('highlighted', l => l.source.id === d.id || l.target.id === d.id)
         .classed('dimmed', l => l.source.id !== d.id && l.target.id !== d.id);

  nodeSel.classed('highlighted', n => n.id === d.id)
         .classed('dimmed', n => n.id !== d.id && !neighbors.has(n.id));
}

function clearHighlight() {
  selectedNode = null;
  linkSel.classed('highlighted', false).classed('dimmed', false);
  nodeSel.classed('highlighted', false).classed('dimmed', false);
}

// Panel
const panel = document.getElementById('info-panel');

function showPanel(d) {
  const label = formatLabel(d.id);
  const neighbors = [...adjMap[d.id]].sort();

  document.getElementById('panel-title').textContent = label;
  const typeEl = document.getElementById('panel-type');
  typeEl.textContent = d.type === 'person' ? 'Person' : 'Interest';
  typeEl.className = `panel-type ${d.type}`;

  document.getElementById('conn-count').textContent = d.degree;

  const personDetails = document.getElementById('person-details');
  if (d.type === 'person' && graphData.member_info[d.id]) {
    const info = graphData.member_info[d.id];
    personDetails.style.display = 'block';
    document.getElementById('p-role').textContent = info.role || '—';
    document.getElementById('p-inst').textContent = info.institution || '—';
    document.getElementById('p-email').innerHTML = info.email
      ? `<a href="mailto:${info.email}">${info.email}</a>` : '—';
    document.getElementById('p-url').innerHTML = info.url
      ? `<a href="${info.url}" target="_blank">View Profile ↗</a>` : '—';
  } else {
    personDetails.style.display = 'none';
  }

  const chips = document.getElementById('conn-chips');
  chips.innerHTML = '';
  neighbors.forEach(nid => {
    const ntype = graphData.nodes.find(x => x.id === nid)?.type || 'interest';
    const btn = document.createElement('button');
    btn.className = `conn-chip ${ntype}`;
    btn.textContent = formatLabel(nid);
    btn.onclick = () => {
      const nd = graphData.nodes.find(x => x.id === nid);
      if (nd) { highlightNode(nd); showPanel(nd); }
    };
    chips.appendChild(btn);
  });

  panel.classList.remove('hidden');
}

function onNodeClick(event, d) {
  event.stopPropagation();
  highlightNode(d);
  showPanel(d);
}

svg.on('click', () => {
  clearHighlight();
  panel.classList.add('hidden');
});

document.getElementById('close-panel').onclick = () => {
  clearHighlight();
  panel.classList.add('hidden');
};

// Controls
let paused = false;
document.getElementById('btn-pause').onclick = function() {
  paused = !paused;
  if (paused) { sim.stop(); this.textContent = 'Resume Motion'; this.classList.add('active'); }
  else { sim.alpha(0.3).restart(); this.textContent = 'Pause Motion'; this.classList.remove('active'); }
};

document.getElementById('btn-reset').onclick = () => {
  svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity);
  clearHighlight();
  panel.classList.add('hidden');
};

document.getElementById('btn-fit').onclick = () => {
  const bounds = g.node().getBBox();
  const fullW = width, fullH = height;
  const bW = bounds.width, bH = bounds.height;
  const scale = Math.min(0.95 * fullW / bW, 0.95 * fullH / bH, 2);
  const tx = fullW / 2 - scale * (bounds.x + bW / 2);
  const ty = fullH / 2 - scale * (bounds.y + bH / 2);
  svg.transition().duration(700).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
};

// Search
const searchInput = document.getElementById('search');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { searchResults.style.display = 'none'; return; }
  const matches = graphData.nodes.filter(n => formatLabel(n.id).toLowerCase().includes(q)).slice(0, 10);
  if (!matches.length) { searchResults.style.display = 'none'; return; }
  searchResults.innerHTML = matches.map(n =>
    `<div class="search-item" data-id="${n.id}">${formatLabel(n.id)}<span class="badge ${n.type}">${n.type}</span></div>`
  ).join('');
  searchResults.style.display = 'block';
});

searchResults.addEventListener('click', function(e) {
  const item = e.target.closest('.search-item');
  if (!item) return;
  const id = item.dataset.id;
  const nd = graphData.nodes.find(x => x.id === id);
  if (!nd) return;
  searchInput.value = formatLabel(id);
  searchResults.style.display = 'none';
  highlightNode(nd);
  showPanel(nd);
  // Pan to node
  if (nd.x !== undefined) {
    const scale = 1.2;
    const tx = width / 2 - scale * nd.x;
    const ty = height / 2 - scale * nd.y;
    svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
  }
});

document.addEventListener('click', e => {
  if (!e.target.closest('#search-wrap')) searchResults.style.display = 'none';
});

// Resize
window.addEventListener('resize', () => {
  width = container.clientWidth;
  height = container.clientHeight;
  sim.force('center', d3.forceCenter(width / 2, height / 2));
});
</script>
